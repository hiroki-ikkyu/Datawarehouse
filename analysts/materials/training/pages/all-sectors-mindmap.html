<style>
:root{--bg:#0f1117;--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.08);--text:#e8e8ed;--sub:#8e8e93;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.header{text-align:center;padding:28px 20px 16px;}
.header .tag{display:inline-block;background:rgba(255,255,255,0.08);padding:4px 14px;border-radius:20px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:8px;}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header p{font-size:12px;color:var(--sub);margin-top:4px;}
.controls{display:flex;justify-content:center;gap:6px;padding:8px 12px 16px;flex-wrap:wrap;}
.ctrl-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--sub);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.ctrl-btn:hover,.ctrl-btn.active{background:rgba(255,255,255,0.12);color:var(--text);border-color:rgba(255,255,255,0.2);}
.legend{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;padding:4px 16px 12px;font-size:10px;color:var(--sub);}
.legend-item{display:flex;align-items:center;gap:4px;}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.map-container{width:100%;overflow:auto;-webkit-overflow-scrolling:touch;padding:0 8px 40px;}
svg{display:block;margin:0 auto;}
.tooltip{position:fixed;background:#1c1c1e;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:14px 16px;font-size:12px;color:var(--text);max-width:280px;line-height:1.7;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
.tooltip.show{opacity:1;}
.tooltip .tt-title{font-weight:700;font-size:13px;margin-bottom:6px;}
.tooltip .tt-body{color:var(--sub);}
.footnote{text-align:center;font-size:11px;color:var(--sub);padding:0 16px 40px;opacity:0.6;}
</style>

let currentSector = 'mining';
const infoMap = {};

function flattenForInfo(node){
  infoMap[node.id]={title:node.label+(node.labelEn?' ('+node.labelEn+')':''),body:node.info||''};
  (node.children||[]).forEach(c=>flattenForInfo(c));
}
SECTORS.forEach(s=>flattenForInfo(s.data));

// Build controls
const ctrlBar = document.getElementById('controlBar');
SECTORS.forEach(s=>{
  const b = document.createElement('button');
  b.className = 'ctrl-btn'+(s.id===currentSector?' active':'');
  b.textContent = s.label;
  b.style.borderColor = s.color+'66';
  b.onclick = ()=>{ currentSector=s.id; document.querySelectorAll('.ctrl-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); };
  ctrlBar.appendChild(b);
});

function countLeaves(node){
  if(!node.children||node.children.length===0) return 1;
  return node.children.reduce((s,c)=>s+countLeaves(c),0);
}

function render(){
  const sector = SECTORS.find(s=>s.id===currentSector);
  const data = sector.data;
  const nodes=[], links=[];

  function traverse(node,x,yStart,yEnd,depth){
    const y=(yStart+yEnd)/2;
    nodes.push({id:node.id,label:node.label,labelEn:node.labelEn||'',color:node.color,x,y,depth});
    const children=node.children||[];
    if(children.length>0){
      const childH=(yEnd-yStart)/children.length;
      children.forEach((child,i)=>{
        const cy1=yStart+childH*i, cy2=cy1+childH;
        const cx=x+240;
        const result=traverse(child,cx,cy1,cy2,depth+1);
        if(result) links.push({x1:x,y1:y,x2:result.x,y2:result.y,color:child.color});
      });
    }
    return {x,y};
  }

  const leaves=countLeaves(data);
  const totalH=Math.max(leaves*48,300);
  const W=1100;
  traverse(data,120,20,totalH,0);

  let svg=`<svg width="${W}" height="${totalH+40}" viewBox="0 0 ${W} ${totalH+40}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;

  links.forEach(l=>{
    const mx=(l.x1+l.x2)/2;
    svg+=`<path d="M${l.x1+70} ${l.y1} C${mx} ${l.y1}, ${mx} ${l.y2}, ${l.x2-70} ${l.y2}" fill="none" stroke="${l.color}" stroke-width="1.5" opacity="0.25"/>`;
  });

  nodes.forEach(n=>{
    const w=n.depth===0?140:n.depth===1?120:110;
    const h=n.labelEn?46:34;
    const rx=n.depth===0?24:10;
    svg+=`<g style="cursor:pointer" onmouseenter="showTT(event,'${n.id}')" onmouseleave="hideTT()" ontouchstart="showTT(event,'${n.id}')">`;
    if(n.depth===0){
      svg+=`<rect x="${n.x-w/2}" y="${n.y-h/2}" width="${w}" height="${h}" rx="${rx}" fill="${n.color}" filter="url(#glow)" opacity="0.3"/>`;
      svg+=`<rect x="${n.x-w/2}" y="${n.y-h/2}" width="${w}" height="${h}" rx="${rx}" fill="${n.color}" opacity="0.9"/>`;
    } else {
      svg+=`<rect x="${n.x-w/2}" y="${n.y-h/2}" width="${w}" height="${h}" rx="${rx}" fill="rgba(255,255,255,0.06)" stroke="${n.color}" stroke-width="1.5" opacity="0.9"/>`;
    }
    const tc=n.depth===0?'#fff':'#e8e8ed';
    const fs=n.depth===0?14:n.depth===1?12:11;
    const ly=n.labelEn?n.y-5:n.y+4;
    svg+=`<text x="${n.x}" y="${ly}" text-anchor="middle" fill="${tc}" font-family="'DM Sans','Noto Sans JP',sans-serif" font-size="${fs}" font-weight="700">${n.label}</text>`;
    if(n.labelEn) svg+=`<text x="${n.x}" y="${n.y+11}" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="'DM Sans',sans-serif" font-size="9">${n.labelEn}</text>`;
    svg+=`</g>`;
  });
  svg+=`</svg>`;
  document.getElementById('mapContainer').innerHTML=svg;
}

function showTT(e,id){
  const tt=document.getElementById('tooltip');
  const info=infoMap[id];
  if(!info)return;
  document.getElementById('ttTitle').textContent=info.title;
  document.getElementById('ttBody').textContent=info.body;
  const touch=e.touches?e.touches[0]:e;
  let left=touch.clientX+12,top=touch.clientY-60;
  if(left+290>window.innerWidth)left=touch.clientX-290;
  if(top<10)top=touch.clientY+20;
  tt.style.left=left+'px';tt.style.top=top+'px';tt.classList.add('show');
}
function hideTT(){document.getElementById('tooltip').classList.remove('show');}
document.addEventListener('touchstart',e=>{if(!e.target.closest('g'))hideTT();});

render();
</script>
