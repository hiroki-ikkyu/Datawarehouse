name: Ikkyu Capital Daily Pipeline

on:
  schedule:
    - cron: "30 21 * * *"  # UTC 21:30 = JST 翌6:30（毎日）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests yfinance pandas anthropic

      - name: Fetch Fear & Greed Index
        run: python infrastructure/scripts/fetch_fear_greed.py

      - name: Fetch Crypto Fear & Greed Index
        run: python infrastructure/scripts/fetch_crypto_fear_greed.py

      - name: Fetch commodity prices
        run: python infrastructure/scripts/fetch_commodities.py

      - name: Generate alerts
        run: python infrastructure/scripts/generate_alerts.py

      - name: Calculate spreads
        run: python analysts/materials/spreads/calc_spreads.py

      - name: Generate morning comment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python public-relations/morning-brief/generate_comment.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u '+%Y-%m-%d')
            git commit -m "data: update fear-greed ${DATE}"
            git push
          fi
